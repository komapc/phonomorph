name: Auto-Fill Transformations

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Candidates to process per run (default: 30)"
        required: false
        default: "30"
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  auto-fill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install google-genai boto3

      - name: Run auto-fill script
        run: python scripts/auto-fill.py
        env:
          BATCH_SIZE: ${{ inputs.batch_size || '30' }}

      - name: Count filled transformations
        id: count
        run: |
          if [ -f /tmp/auto-fill-summary.json ]; then
            N=$(python3 -c "import json; d=json.load(open('/tmp/auto-fill-summary.json')); print(len(d['filled']))")
            echo "filled=$N" >> "$GITHUB_OUTPUT"
          else
            echo "filled=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push branch
        if: steps.count.outputs.filled != '0'
        id: push
        run: |
          BRANCH="auto-fill/$(date +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/transformations/ public/data/index.json public/data/shards/
          N=${{ steps.count.outputs.filled }}
          git commit -m "docs: auto-fill $N transformations via Gemini 2.0 Flash"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.count.outputs.filled != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          N=${{ steps.count.outputs.filled }}
          gh pr create \
            --title "auto: fill $N phonetic transformations (Gemini 2.0 Flash)" \
            --body-file /tmp/pr-body.md \
            --head "${{ steps.push.outputs.branch }}" \
            --base master

      - name: Summary
        if: always()
        run: |
          if [ -f /tmp/auto-fill-summary.json ]; then
            echo "### Auto-fill summary" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          d = json.load(open('/tmp/auto-fill-summary.json'))
          print(f'- Filled: {len(d[\"filled\"])}')
          print(f'- Skipped: {len(d[\"skipped\"])}')
          print(f'- Failed: {len(d[\"failed\"])}')
          " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Script did not produce a summary (no candidates found)." >> "$GITHUB_STEP_SUMMARY"
          fi
