name: Validate Data

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run Tests
        run: npm test
      - name: Rebuild Index (Data Integrity Check)
        run: npm run rebuild-index
      - name: Validate Source Links
        run: npx tsx scripts/validate-links.ts
      - name: Check for Uncommitted Data Changes
        run: |
          # Use git add -N to track new files, then check for differences
          git add -N public/data/index.json public/data/shards/
          if ! git diff --exit-code public/data/index.json public/data/shards/; then
            echo "Error: Data index or shards are out of sync with transformation files."
            echo "Please run 'npm run rebuild-index' locally and commit the changes."
            exit 1
          fi
