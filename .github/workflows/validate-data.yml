name: Validate Data

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run Tests
        run: npm test
      - name: Rebuild Index (Data Integrity Check)
        # index.json and the transformations/unattested shards are gitignored
        # build artifacts produced from public/data/transformations/ and
        # public/data/unattested.json. This step verifies the regeneration
        # succeeds; the artifacts themselves are generated fresh at deploy
        # time, not committed.
        run: npm run rebuild-index
      - name: Validate Source Links
        run: npx tsx scripts/validate-links.ts
